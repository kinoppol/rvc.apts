<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue background rounded square -->
  <rect width="32" height="32" rx="6" fill="#2563EB"/>
  <!-- Grid: 3 columns × 3 rows of white cells with gaps -->
  <!-- Row 1 -->
  <rect x="4"  y="4"  width="7" height="5" rx="1" fill="white" opacity="0.95"/>
  <rect x="13" y="4"  width="7" height="5" rx="1" fill="white" opacity="0.95"/>
  <rect x="22" y="4"  width="6" height="5" rx="1" fill="white" opacity="0.95"/>
  <!-- Row 2 -->
  <rect x="4"  y="11" width="7" height="5" rx="1" fill="white" opacity="0.7"/>
  <rect x="13" y="11" width="7" height="5" rx="1" fill="white" opacity="0.7"/>
  <rect x="22" y="11" width="6" height="5" rx="1" fill="white" opacity="0.7"/>
  <!-- Row 3 -->
  <rect x="4"  y="18" width="7" height="5" rx="1" fill="white" opacity="0.5"/>
  <rect x="13" y="18" width="7" height="5" rx="1" fill="white" opacity="0.5"/>
  <rect x="22" y="18" width="6" height="5" rx="1" fill="white" opacity="0.5"/>
  <!-- Row 4 -->
  <rect x="4"  y="25" width="7" height="3" rx="1" fill="white" opacity="0.35"/>
  <rect x="13" y="25" width="7" height="3" rx="1" fill="white" opacity="0.35"/>
  <rect x="22" y="25" width="6" height="3" rx="1" fill="white" opacity="0.35"/>
</svg>
